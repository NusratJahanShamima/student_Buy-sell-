<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Seller Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/seller_dashboard.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-light bg-white shadow-sm fixed-top px-3 d-flex justify-content-between">

    <!-- LEFT -->
    <div class="d-flex align-items-center">

        <!-- MOBILE MENU BUTTON -->
        <button class="btn btn-outline-success d-md-none me-2" onclick="toggleSidebar()">
            <i class="bi bi-list"></i>
        </button>

        <span class="navbar-brand fw-bold text-success fs-5 mb-0">
            <i class="bi bi-cart"></i> Marketplace
        </span>
    </div>

    <!-- RIGHT -->
    <div class="d-flex align-items-center">

        <!-- Notification -->
        <div class="position-relative me-3">
            <i class="bi bi-bell fs-5"></i>
            <span class="badge bg-danger badge-notify" style="display:none;">0</span>
        </div>

        <!-- Profile -->
        <div class="d-flex align-items-center">
            <i class="bi bi-person-circle fs-4 me-1"></i>
            <span class="username fw-bold small"></span>
        </div>

    </div>

</nav>

<!-- SIDEBAR -->
<div class="sidebar">

    <ul class="nav flex-column mt-4">

        <li><a class="nav-link active"><i class="bi bi-speedometer2"></i> Dashboard</a></li>

        <li><a class="nav-link" href="my-listings.html"><i class="bi bi-box"></i> My Listings</a></li>

        <li><a class="nav-link" href="chat.html"><i class="bi bi-chat"></i> Messages</a></li>

        <li><a class="nav-link" href="saved.html"><i class="bi bi-bookmark"></i> Saved</a></li>

        <li><a class="nav-link" href="profile.html"><i class="bi bi-person"></i> Profile</a></li>

        <li><a class="nav-link" href="buy_sell.html"><i class="bi bi-arrow-left"></i> Back Buy/Sell</a></li>

        <li class="mt-3">
            <a class="nav-link text-danger" href="#" onclick="logout()">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>
        </li>

    </ul>

</div>

<!--  CONTENT -->
<div class="content-area">

    <div class="container-fluid p-3 p-md-4">

        <h3>Dashboard</h3>
        <p>Welcome back, <span class="username"></span> 👋</p>

        <!-- STATS -->
        <div class="row g-3">

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card stat-card" onclick="goToListings()">
                    <h4 id="totalProducts">0</h4>
                    <p>My Listings</p>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card stat-card" onclick="goToMessages()">
                    <h4 id="totalMessages">0</h4>
                    <p>Messages</p>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card stat-card" onclick="goToSaved()">
                    <h4 id="totalSaved">0</h4>
                    <p>Saved Items</p>
                </div>
            </div>

        </div>

        <!-- PRODUCTS -->
        <div class="mt-5">

            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                <h5 class="mb-0">My Products</h5>

                <a href="add-product.html" class="btn btn-success btn-sm">
                    <i class="bi bi-plus"></i> Add Product
                </a>
            </div>

            
            <div id="productList" class="row mt-3"></div>

        </div>

    </div>

</div>

<!-- JS -->
<script src="js/seller.js"></script>

<script>
function logout() {
    localStorage.removeItem('user');
    window.location.href = "login.html";
}

function goToListings() {
    window.location.href = "my-listings.html";
}

function goToMessages() {
    window.location.href = "chat.html";
}

function goToSaved() {
    window.location.href = "saved.html";
}

// MOBILE SIDEBAR TOGGLE
function toggleSidebar() {
    document.querySelector('.sidebar').classList.toggle('active');
}
</script>

</body>
</html>
